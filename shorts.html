<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shorts - Intube</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { margin: 0; font-family: 'Roboto', sans-serif; background-color: #000; color: white; overflow: hidden; }
        
        /* Shorts Scroll Container */
        .shorts-container { height: calc(100vh - 60px); width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .shorts-container::-webkit-scrollbar { display: none; }
        
        /* Individual Short Card */
        .short-wrapper { height: 100%; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; justify-content: center; align-items: center; }
        .short-video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Top Icons (Search & Menu) */
        .top-icons { position: absolute; top: 15px; right: 15px; display: flex; gap: 20px; z-index: 10; }
        .top-icons svg { fill: white; width: 24px; height: 24px; filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.8)); }

        /* Bottom UI Overlays (Channel, Subscribe, Title, Music) */
        .bottom-info { position: absolute; bottom: 20px; left: 12px; width: 75%; z-index: 10; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .channel-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .channel-avatar { width: 32px; height: 32px; border-radius: 50%; background: #065fd4; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .channel-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .channel-handle { font-size: 14px; font-weight: 500; color: #fff;}
        .sub-btn { background: #fff; color: #0f0f0f; border: none; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s;}
        .sub-btn.subscribed { background: rgba(255,255,255,0.2); color: white; }
        
        .short-title { font-size: 14px; margin: 0 0 10px 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-weight: 400;}
        
        .music-row { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 400; }
        .music-row svg { fill: white; width: 14px; height: 14px; }
        .music-marquee { width: 150px; overflow: hidden; white-space: nowrap; }

        /* Right Side Floating Actions (Like, Dislike, Comment, Share) */
        .right-actions { position: absolute; bottom: 20px; right: 10px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: white; }
        .icon-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: 0.2s;}
        .icon-circle svg { width: 28px; height: 28px; fill: white; filter: drop-shadow(0px 1px 3px rgba(0,0,0,0.8));}
        .action-btn.active .icon-circle svg { fill: #fff; } /* YouTube shorts keeps them white, but we can manage state in JS */
        .action-text { font-size: 12px; font-weight: 500; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); }
        .sound-disk { width: 40px; height: 40px; border-radius: 5px; background: #333; overflow: hidden; border: 2px solid white; margin-top: 10px;}
        .sound-disk img { width: 100%; height: 100%; object-fit: cover;}

        /* Video Progress Bar (Bottom Red Line) */
        .progress-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.3); z-index: 10; }
        .progress-fill { height: 100%; width: 0%; background: red; }

        /* Comments Modal */
        .comments-modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65vh; background: white; color: black; z-index: 2000; border-radius: 16px 16px 0 0; transition: 0.3s ease-in-out; display: flex; flex-direction: column; box-shadow: 0 -5px 15px rgba(0,0,0,0.2);}
        .comments-modal.active { bottom: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #ddd; }
        .modal-header h3 { margin: 0; font-size: 16px; font-weight: 700;}
        .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; }
        .modal-body { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .modal-footer { padding: 10px 15px 20px 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; background: #f9f9f9;}
        .modal-footer input { flex-grow: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 20px; outline: none; background: #eee;}
        .modal-footer button { background: #065fd4; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 500; cursor: pointer; }
        .comment-item { display: flex; gap: 12px; margin-bottom: 20px; }
        .comment-item img, .comment-item .c-avatar { width: 34px; height: 34px; border-radius: 50%; background: #065fd4; color: white; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold;}
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #0f0f0f; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 3000; }
        .nav-item { text-align: center; cursor: pointer; color: #fff; display: flex; flex-direction: column; align-items: center; text-decoration: none; font-size: 20px;}
        .nav-item small { display: block; font-size: 10px; margin-top: 3px; font-weight: 400;}
        .nav-item.active { font-weight: 700; }
        .add-icon { font-size: 26px; font-weight: 400;}
    </style>
</head>
<body>

    <div class="shorts-container" id="shortsFeed">
        <p style="text-align: center; margin-top: 50px;">Loading Shorts...</p>
    </div>

    <div class="comments-modal" id="commentsModal">
        <div class="modal-header">
            <h3 id="modalCommentCount">Comments</h3>
            <button class="close-btn" onclick="closeComments()">✖</button>
        </div>
        <div class="modal-body" id="modalCommentList">
            <p style="text-align:center; color:#606060;">Loading...</p>
        </div>
        <div class="modal-footer">
            <input type="text" id="shortCommentInput" placeholder="Add a comment...">
            <button onclick="postShortComment()">Post</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item" style="color:white;">🏠<small>Home</small></a>
        <a href="shorts.html" class="nav-item active" style="color:white;"><b>⚡</b><small>Shorts</small></a>
        <a href="studio.html" class="nav-item add-icon" style="color:white;">➕</a>
        <a href="subs.html" class="nav-item" style="color:white;">🔔<small>Subs</small></a>
        <a href="profile.html" class="nav-item" style="color:white;">👤<small>You</small></a>
    </div>

    <script>
        // Exact Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAnXb8ka21ajr_HSGHtfhFoIwqOGBdhi_0",
            authDomain: "intube-ba578.firebaseapp.com",
            projectId: "intube-ba578",
            storageBucket: "intube-ba578.firebasestorage.app",
            messagingSenderId: "862455398504",
            appId: "1:862455398504:web:bc76d18bf7670bb5aa3bdd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentActiveDocId = null;

        // 1. Fetch Videos & Create exact YouTube Shorts UI
        db.collection("videos").orderBy("uploadedAt", "desc").get().then(snap => {
            const feed = document.getElementById('shortsFeed');
            feed.innerHTML = "";

            if (snap.empty) {
                feed.innerHTML = "<p style='text-align: center; margin-top: 50px;'>No shorts available.</p>";
                return;
            }

            snap.forEach(doc => {
                const v = doc.data();
                const docId = doc.id;
                
                let avatar = v.channelAvatar ? `<img src="${v.channelAvatar}">` : `<span>${(v.channelName || 'T').charAt(0).toUpperCase()}</span>`;
                let handleName = "@" + (v.channelName ? v.channelName.replace(/\s+/g, '').toLowerCase() : "thenewtips");

                const shortHtml = `
                    <div class="short-wrapper" id="short_${docId}">
                        <video class="short-video" src="https://intube-backend.onrender.com/stream/${v.fileId}" loop playsinline onclick="togglePlayPause(this)" ontimeupdate="updateProgress(this, '${docId}')"></video>
                        
                        <div class="top-icons">
                            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                            <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                        </div>

                        <div class="right-actions">
                            <div class="action-btn" id="likeBtn_${docId}" onclick="toggleShortLike('${docId}')">
                                <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91z"/></svg></div>
                                <span class="action-text" id="likeCount_${docId}">${v.likes || 0}</span>
                            </div>

                            <div class="action-btn" id="dislikeBtn_${docId}" onclick="toggleShortDislike('${docId}')">
                                <div class="icon-circle"><svg viewBox="0 0 24 24" style="transform: rotate(180deg);"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91z"/></svg></div>
                                <span class="action-text">Dislike</span>
                            </div>
                            
                            <div class="action-btn" onclick="openComments('${docId}')">
                                <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg></div>
                                <span class="action-text" id="commentCountBtn_${docId}">0</span>
                            </div>
                            
                            <div class="action-btn" onclick="shareShort('${v.title}', '${v.fileId}')">
                                <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M11.7333 8.26667V4L19.7333 12L11.7333 20V15.6267C6.4 15.6267 2.66667 17.3333 0 21.0667C1.06667 15.7333 4.26667 10.4 11.7333 8.26667Z"/></svg></div>
                                <span class="action-text">Share</span>
                            </div>

                            <div class="sound-disk">${avatar}</div>
                        </div>

                        <div class="bottom-info">
                            <div class="channel-row">
                                <div class="channel-avatar">${avatar}</div>
                                <span class="channel-handle">${handleName}</span>
                                <button class="sub-btn" id="subBtn_${docId}" onclick="toggleSubscribe('${v.uploaderId}', '${docId}')">Subscribe</button>
                            </div>
                            <p class="short-title">${v.title}</p>
                            <div class="music-row">
                                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                                <div class="music-marquee"><marquee scrollamount="4">Original audio - ${handleName}</marquee></div>
                            </div>
                        </div>

                        <div class="progress-bar-container">
                            <div class="progress-fill" id="progress_${docId}"></div>
                        </div>
                    </div>
                `;
                feed.innerHTML += shortHtml;

                // Load initial comment count and Sub status
                loadInitialData(docId, v.uploaderId);
            });

            setupIntersectionObserver();
            checkAllLikesDislikes();
        });

        // 2. Auto-Play, Pause, and Progress Logic
        function setupIntersectionObserver() {
            const videos = document.querySelectorAll('.short-video');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.play().catch(e => console.log("Auto-play blocked"));
                    } else {
                        entry.target.pause();
                        entry.target.currentTime = 0; // Reset video when out of view
                    }
                });
            }, { threshold: 0.6 });

            videos.forEach(video => observer.observe(video));
        }

        function togglePlayPause(videoElement) {
            if (videoElement.paused) videoElement.play();
            else videoElement.pause();
        }

        function updateProgress(videoElement, docId) {
            const percentage = (videoElement.currentTime / videoElement.duration) * 100;
            const progressBar = document.getElementById(`progress_${docId}`);
            if(progressBar) progressBar.style.width = percentage + '%';
        }

        function checkLogin() {
            if (!auth.currentUser) { alert("Please login to use this feature!"); return false; }
            return true;
        }

        // 3. Like & Dislike Logic (Same as player)
        function checkAllLikesDislikes() {
            if(!auth.currentUser) return;
            const uid = auth.currentUser.uid;
            
            document.querySelectorAll('[id^="likeBtn_"]').forEach(btn => {
                const docId = btn.id.split('_')[1];
                db.collection("videos").doc(docId).collection("likes").doc(uid).onSnapshot(doc => {
                    if(doc.exists) document.querySelector(`#likeBtn_${docId} svg`).style.fill = '#fff';
                    else document.querySelector(`#likeBtn_${docId} svg`).style.fill = '#fff'; // Kept white as per YT design
                });
                db.collection("videos").doc(docId).collection("dislikes").doc(uid).onSnapshot(doc => {
                    if(doc.exists) document.querySelector(`#dislikeBtn_${docId} svg`).style.fill = '#fff';
                    else document.querySelector(`#dislikeBtn_${docId} svg`).style.fill = '#fff';
                });
            });
        }

        function toggleShortLike(docId) {
            if(!checkLogin()) return;
            const uid = auth.currentUser.uid;
            const likeRef = db.collection("videos").doc(docId).collection("likes").doc(uid);
            const dislikeRef = db.collection("videos").doc(docId).collection("dislikes").doc(uid);
            
            likeRef.get().then(doc => {
                if(doc.exists) {
                    likeRef.delete();
                    db.collection("videos").doc(docId).update({ likes: firebase.firestore.FieldValue.increment(-1) });
                    document.getElementById(`likeCount_${docId}`).innerText = parseInt(document.getElementById(`likeCount_${docId}`).innerText) - 1;
                } else {
                    likeRef.set({ timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                    db.collection("videos").doc(docId).update({ likes: firebase.firestore.FieldValue.increment(1) });
                    document.getElementById(`likeCount_${docId}`).innerText = parseInt(document.getElementById(`likeCount_${docId}`).innerText) + 1;
                    dislikeRef.get().then(dDoc => { if(dDoc.exists) dislikeRef.delete(); });
                }
            });
        }

        function toggleShortDislike(docId) {
            if(!checkLogin()) return;
            const uid = auth.currentUser.uid;
            const likeRef = db.collection("videos").doc(docId).collection("likes").doc(uid);
            const dislikeRef = db.collection("videos").doc(docId).collection("dislikes").doc(uid);

            dislikeRef.get().then(doc => {
                if(doc.exists) { dislikeRef.delete(); } 
                else {
                    dislikeRef.set({ timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                    likeRef.get().then(lDoc => {
                        if(lDoc.exists) {
                            likeRef.delete();
                            db.collection("videos").doc(docId).update({ likes: firebase.firestore.FieldValue.increment(-1) });
                            document.getElementById(`likeCount_${docId}`).innerText = parseInt(document.getElementById(`likeCount_${docId}`).innerText) - 1;
                        }
                    });
                }
            });
        }

        // 4. Subscribe Logic
        function loadInitialData(docId, uploaderId) {
            // Load comment count for UI
            db.collection("videos").doc(docId).collection("comments").onSnapshot(snap => {
                const countSpan = document.getElementById(`commentCountBtn_${docId}`);
                if(countSpan) countSpan.innerText = snap.size;
            });

            // Check subscribe status
            if(auth.currentUser && uploaderId) {
                db.collection("users").doc(auth.currentUser.uid).collection("subscriptions").doc(uploaderId).onSnapshot(doc => {
                    const subBtn = document.getElementById(`subBtn_${docId}`);
                    if(subBtn) {
                        if(doc.exists) { subBtn.innerText = "Subscribed"; subBtn.classList.add('subscribed'); }
                        else { subBtn.innerText = "Subscribe"; subBtn.classList.remove('subscribed'); }
                    }
                });
            }
        }

        function toggleSubscribe(uploaderId, docId) {
            if(!checkLogin() || !uploaderId) return;
            if (uploaderId === auth.currentUser.uid) { alert("You can't subscribe to yourself!"); return; }

            const subRef = db.collection("users").doc(auth.currentUser.uid).collection("subscriptions").doc(uploaderId);
            
            subRef.get().then(doc => {
                if (doc.exists) {
                    subRef.delete().then(() => db.collection("users").doc(uploaderId).update({ subscribers: firebase.firestore.FieldValue.increment(-1) }));
                } else {
                    subRef.set({ subscribedAt: firebase.firestore.FieldValue.serverTimestamp() }).then(() => db.collection(
