<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intube - Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { margin: 0; font-family: 'Roboto', sans-serif; background-color: #f9f9f9; color: #0f0f0f; padding-bottom: 70px; } 
        
        /* Header & Categories */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; position: sticky; top: 0; background: white; z-index: 100; }
        .logo { font-size: 20px; font-weight: 700; color: #ff0000; display: flex; align-items: center; gap: 5px; }
        
        /* Smart Search Bar Styling */
        .search-container { padding: 5px 15px 15px 15px; background: white; border-bottom: 1px solid #e5e5e5; }
        .search-box { width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; font-size: 14px; outline: none; box-sizing: border-box; background: #f9f9f9; }
        .search-box:focus { border: 1px solid #065fd4; }

        .categories { display: flex; gap: 10px; padding: 10px 15px; overflow-x: auto; background: white; white-space: nowrap; border-bottom: 1px solid #e5e5e5; }
        .categories::-webkit-scrollbar { display: none; }
        .category-chip { background: #f2f2f2; padding: 6px 12px; border-radius: 8px; font-size: 14px; border: 1px solid transparent; cursor: pointer; }
        .category-chip.active { background: #0f0f0f; color: white; }
        
        /* Video Card Styling */
        .video-card { margin-bottom: 15px; background: white; cursor: pointer; padding-bottom: 10px; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background-color: #111; position: relative; display: flex; justify-content: center; align-items: center; color: white; font-weight: 500; overflow: hidden; }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .video-info { display: flex; gap: 12px; padding: 12px 15px 0 15px; }
        .channel-avatar { width: 40px; height: 40px; border-radius: 50%; background: #065fd4; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden; }
        .channel-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .video-details { flex-grow: 1; }
        .video-title { font-size: 16px; font-weight: 500; margin: 0 0 4px 0; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .channel-name { font-size: 12px; color: #606060; margin: 0; }
        
        /* Unified Navigation Bar */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; z-index: 1000; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); }
        .nav-item { text-align: center; cursor: pointer; color: #0f0f0f; display: flex; flex-direction: column; align-items: center; }
        .nav-item small { display: block; font-size: 10px; margin-top: 2px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" style="fill:red; width: 28px; height: 28px;"><path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.861-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M10,15.464V8.536L16,12L10,15.464z"/></svg>
            Intube
        </div>
        <div class="channel-avatar">
            <img src="my-studio-pic.jpg" onerror="this.style.display='none'; this.parentNode.innerText='T';">
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="Search videos (e.g., Termux, Ethical Hacking)..." onkeyup="searchVideos()">
    </div>

    <div class="categories">
        <div class="category-chip active">All</div>
        <div class="category-chip">Computer security</div>
        <div class="category-chip">APIs</div>
        <div class="category-chip">Ethical Hacking</div>
    </div>

    <div id="videoFeed">
        <p style="text-align: center; padding: 40px; color: #606060;">Loading videos from database...</p>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location='index.html'"><b>🏠</b><small><b>Home</b></small></div>
        <div class="nav-item" onclick="window.location='shorts.html'">⚡<small>Shorts</small></div>
        <div class="nav-item" onclick="window.location='studio.html'" style="font-size: 24px;">➕</div>
        <div class="nav-item" onclick="window.location='subs.html'">🔔<small>Subs</small></div>
        <div class="nav-item" onclick="window.location='profile.html'">👤<small>You</small></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnXb8ka21ajr_HSGHtfhFoIwqOGBdhi_0",
            authDomain: "intube-ba578.firebaseapp.com",
            projectId: "intube-ba578",
            storageBucket: "intube-ba578.firebasestorage.app",
            messagingSenderId: "862455398504",
            appId: "1:862455398504:web:bc76d18bf7670bb5aa3bdd",
            measurementId: "G-944K8C4VM8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // NAYA: Ek array banaya taaki data save rahe aur search karna aasaan ho
        let allVideos = [];

        // Database se data fetch karna
        db.collection("videos").orderBy("uploadedAt", "desc").onSnapshot((querySnapshot) => {
            allVideos = []; // Purana data clear karein
            querySnapshot.forEach((doc) => {
                allVideos.push(doc.data());
            });
            
            // Shuru mein saari videos dikhayein
            displayVideos(allVideos);
        }, (error) => {
            console.error("Error fetching videos: ", error);
            document.getElementById("videoFeed").innerHTML = "<p style='text-align:center; color:red;'>Database error. Check connection.</p>";
        });

        // Videos ko screen par dikhane ka function
        function displayVideos(videosArray) {
            const feed = document.getElementById("videoFeed");
            feed.innerHTML = ""; 

            if(videosArray.length === 0) {
                feed.innerHTML = "<p style='text-align:center; padding:40px; color:#606060;'>No videos found matching your search.</p>";
                return;
            }

            videosArray.forEach((video) => {
                const cardHtml = `
                    <div class="video-card" onclick="window.location.href='player.html?id=${video.fileId}&title=${encodeURIComponent(video.title)}'">
                        <div class="thumbnail">
                            <img src="https://img.youtube.com/vi/${video.fileId}/mqdefault.jpg" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <div style="display: none; width: 100%; height: 100%; justify-content: center; align-items: center; background: #111;">
                                ▶ Play Video
                            </div>
                        </div>
                        <div class="video-info">
                            <div class="channel-avatar">
                                <img src="my-studio-pic.jpg" onerror="this.style.display='none'; this.parentNode.innerText='T';">
                            </div>
                            <div class="video-details">
                                <h3 class="video-title">${video.title}</h3>
                                <p class="channel-name">the new tips</p>
                                <p style="font-size:12px; color:#606060; margin:2px 0 0 0;">${video.views || 0} views • Fresh Upload</p>
                            </div>
                        </div>
                    </div>
                `;
                feed.innerHTML += cardHtml;
            });
        }

        // NAYA: Search Function
        function searchVideos() {
            // User ne jo type kiya hai use lein aur chhote aksharon (lowercase) mein badal dein
            const searchQuery = document.getElementById("searchInput").value.toLowerCase();
            
            // allVideos array ko filter karein
            const filteredVideos = allVideos.filter((video) => {
                return video.title.toLowerCase().includes(searchQuery);
            });

            // Filter ki gayi videos ko screen par dikhayein
            displayVideos(filteredVideos);
        }
    </script>
</body>
</html>
