<!DOCTYPE html>
<html>
<head>
    <title>Subscriptions</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <h2>Subscriptions Feed</h2>
    <div id="subsFeed">Loading...</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAnXb8ka21ajr_HSGHtfhFoIwqOGBdhi_0", authDomain: "intube-ba578.firebaseapp.com", projectId: "intube-ba578", storageBucket: "intube-ba578.firebasestorage.app", messagingSenderId: "862455398504", appId: "1:862455398504:web:bc76d18bf7670bb5aa3bdd" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        firebase.auth().onAuthStateChanged(async (user) => {
            if(!user) return window.location.href = "login.html";

            const subsSnap = await db.collection("users").doc(user.uid).collection("subscriptions").get();
            const creators = subsSnap.docs.map(doc => doc.id);

            if(creators.length > 0) {
                db.collection("videos").where("uploaderId", "in", creators).orderBy("uploadedAt", "desc").onSnapshot(snap => {
                    let html = "";
                    snap.forEach(d => {
                        let v = d.data();
                        html += `<div onclick="window.location='player.html?id=${d.id}&title=${encodeURIComponent(v.title)}'" style="padding:15px; border-bottom:1px solid #ddd;">
                                    <h3>${v.title}</h3>
                                    <p>Creator: ${v.channelName}</p>
                                 </div>`;
                    });
                    document.getElementById('subsFeed').innerHTML = html;
                });
            } else {
                document.getElementById('subsFeed').innerText = "Abhi koi subscription nahi hai.";
            }
        });
    </script>
</body>
</html>
