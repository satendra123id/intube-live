<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intube Player</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; font-family: Roboto, Arial, sans-serif; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        .details { padding: 15px; }
        .title { font-size: 18px; font-weight: bold; margin: 0; }
        .info { color: #606060; font-size: 14px; margin-top: 5px; }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; background: #f2f2f2; font-weight: 500; cursor: pointer; }
        .btn-sub { background: #0f0f0f; color: #fff; }
        .comments { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 15px; }
    </style>
</head>
<body>

    <video id="videoPlayer" class="video-container" controls autoplay playsinline></video>

    <div class="details">
        <h1 class="title" id="titleDisplay">...</h1>
        <p class="info" id="viewCount">Loading...</p>
        
        <div class="actions">
            <button class="btn" onclick="updateLike()">👍 <span id="likeCount">0</span></button>
            <button class="btn">Share</button>
            <button class="btn btn-sub" onclick="subscribe()">Subscribe</button>
        </div>

        <div class="comments">
            <h3>Comments</h3>
            <input type="text" id="commentInput" placeholder="Add a comment..." style="width:90%; padding:10px;">
            <button onclick="postComment()" class="btn">Post</button>
        </div>
    </div>

    <script>
        // Firebase Config (Wahi purana)
        const firebaseConfig = { apiKey: "AIzaSyAnXb8ka21ajr_HSGHtfhFoIwqOGBdhi_0", authDomain: "intube-ba578.firebaseapp.com", projectId: "intube-ba578", storageBucket: "intube-ba578.firebasestorage.app", messagingSenderId: "862455398504", appId: "1:862455398504:web:bc76d18bf7670bb5aa3bdd", measurementId: "G-944K8C4VM8" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');
        const videoTitle = urlParams.get('title');

        document.getElementById('titleDisplay').innerText = videoTitle;
        document.getElementById('videoPlayer').src = 'https://intube-backend.onrender.com/stream/' + fileId;

        const videoRef = db.collection("videos").where("fileId", "==", fileId);

        // Real-time Update
        videoRef.onSnapshot((snapshot) => {
            snapshot.forEach((doc) => {
                document.getElementById('viewCount').innerText = doc.data().views + " views";
                document.getElementById('likeCount').innerText = doc.data().likes || 0;
            });
        });

        function updateLike() {
            videoRef.get().then((snap) => {
                snap.forEach(doc => {
                    doc.ref.update({ likes: firebase.firestore.FieldValue.increment(1) });
                });
            });
        }
    </script>
</body>
</html>
