<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Playing - Intube</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; margin: 0; background: #f2f2f2; color: #0f0f0f; padding-bottom: 20px;}
        
        .fixed-player { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
        .fixed-player video { width: 100%; height: 100%; object-fit: contain; }

        .content-info { padding: 12px 15px; background: #fff; border-bottom: 1px solid #e5e5e5; }
        .video-title { font-size: 18px; font-weight: 500; margin: 0 0 5px 0; line-height: 1.4; color: #0f0f0f;}
        .video-meta { font-size: 13px; color: #606060; margin: 0 0 12px 0; }

        .action-bar { display: flex; align-items: center; justify-content: flex-start; gap: 8px; margin-bottom: 15px; border-bottom: 1px solid #f2f2f2; padding-bottom: 12px; overflow-x: auto; white-space: nowrap;}
        .action-bar::-webkit-scrollbar { display: none; }
        .action-btn { background: #f2f2f2; border: 1px solid #f2f2f2; padding: 7px 15px; border-radius: 20px; font-size: 13px; font-weight: 500; color: #0f0f0f; cursor: pointer; display: flex; align-items: center; gap: 6px;}
        .action-btn.active { background: #065fd4; color: #fff; border-color: #065fd4; }
        .action-btn svg { fill: #0f0f0f; width: 16px; height: 16px;}
        .action-btn.active svg { fill: #fff; }
        .download-btn { background: #22c55e; color: #fff; border-color: #16a34a; font-weight: 700;}
        .download-btn svg { fill: #fff; }

        .channel-box { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: #fff; margin-bottom: 5px; }
        .channel-info { display: flex; align-items: center; gap: 12px;}
        .channel-avatar { width: 40px; height: 40px; border-radius: 50%; background: #065fd4; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden;}
        .channel-avatar img { width: 100%; height: 100%; object-fit: cover;}
        .channel-name { font-size: 15px; font-weight: 500; margin: 0; color: #0f0f0f; }
        .sub-count { font-size: 12px; color: #606060; margin: 2px 0 0 0;}
        .sub-btn { background: #0f0f0f; color: white; border: none; padding: 9px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer;}
        .sub-btn.subscribed { background: #f2f2f2; color: #0f0f0f; font-weight: 400; }

        .comments-section { padding: 0 15px; background: #fff; margin-top: 10px; }
        .comments-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #e5e5e5; }
        .comments-header h3 { margin: 0; font-size: 16px; font-weight: 500; }
        .comment-input-box { display: flex; gap: 10px; margin: 15px 0 20px 0; }
        .comment-input-box input { flex-grow: 1; padding: 11px 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; outline: none; background: #f9f9f9; }
        .post-btn { background: #065fd4; color: white; border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500;}
        .comment-item { display: flex; gap: 12px; margin-bottom: 18px; }
        .comment-avatar { width: 34px; height: 34px; border-radius: 50%; background: #065fd4; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden;}
        .comment-user { font-weight: 500; font-size: 13px; color: #0f0f0f; margin-right: 8px;}
        .comment-text { font-size: 14px; color: #0f0f0f; margin: 4px 0 0 0; line-height: 1.4; }

        /* Up Next Section */
        .suggested-section { background: #fff; margin-top: 10px; padding-top: 10px; }
        .suggested-header { font-size: 16px; font-weight: 500; padding: 5px 15px 15px 15px; margin: 0; color: #0f0f0f; }
        .suggested-card { display: flex; gap: 12px; padding: 0 15px 15px 15px; cursor: pointer; }
        .suggested-thumb { width: 140px; aspect-ratio: 16/9; background-color: #111; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .suggested-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .suggested-info { display: flex; flex-direction: column; }
        .suggested-title { font-size: 14px; font-weight: 500; margin: 0 0 4px 0; color: #0f0f0f; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3;}
        .suggested-meta { font-size: 12px; color: #606060; margin: 0; }
    </style>
</head>
<body>

    <div class="fixed-player">
        <video id="videoPlayer" controls autoplay playsinline></video>
    </div>

    <div class="content-info">
        <h1 class="video-title" id="videoTitle">Loading...</h1>
        <p class="video-meta"><span id="viewCount">0</span> views</p>
        
        <div class="action-bar">
            <div class="action-btn" id="likeBtn" onclick="toggleLike()">
                <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91z"/></svg>
                <span id="likeCount">0</span>
            </div>
            
            <div class="action-btn" id="dislikeBtn" onclick="toggleDislike()">
                <svg viewBox="0 0 24 24" style="transform: rotate(180deg);"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91z"/></svg>
                Dislike
            </div>
            
            <div class="action-btn" onclick="shareVideo()">
                <svg viewBox="0 0 24 24"><path d="M11.7333 8.26667V4L19.7333 12L11.7333 20V15.6267C6.4 15.6267 2.66667 17.3333 0 21.0667C1.06667 15.7333 4.26667 10.4 11.7333 8.26667Z"/></svg>
                Share
            </div>
            
            <div class="action-btn" id="saveBtn" onclick="saveVideo()">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                <span id="saveText">Save</span>
            </div>
            
            <div class="action-btn download-btn" onclick="downloadVideo()">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                Download
            </div>
        </div>

        <div class="channel-box">
            <div class="channel-info">
                <div class="channel-avatar" id="channelAvatar"><span>T</span></div>
                <div class="channel-details">
                    <h2 class="channel-name" id="channelName">the new tips</h2>
                    <p class="sub-count"><span id="channelSubs">0</span> subscribers</p>
                </div>
            </div>
            <button class="sub-btn" id="subBtn" onclick="toggleSubscribe()">Subscribe</button>
        </div>
    </div>

    <div class="comments-section">
        <div class="comments-header">
            <h3>Comments (<span id="commentCount">0</span>)</h3>
        </div>
        
        <div class="comment-input-box">
            <input type="text" id="commentInput" placeholder="Add a public comment...">
            <button class="post-btn" id="postBtn" onclick="postComment()">Post</button>
        </div>
        
        <div id="commentList">
            <p style="text-align: center; color: #606060; padding: 20px;">Fetching comments...</p>
        </div>
    </div>

    <div class="suggested-section">
        <h3 class="suggested-header">Up Next</h3>
        <div id="suggestedList">
            <p style="text-align: center; color: #606060; padding: 20px;">Loading suggested videos...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnXb8ka21ajr_HSGHtfhFoIwqOGBdhi_0",
            authDomain: "intube-ba578.firebaseapp.com",
            projectId: "intube-ba578",
            storageBucket: "intube-ba578.firebasestorage.app",
            messagingSenderId: "862455398504",
            appId: "1:862455398504:web:bc76d18bf7670bb5aa3bdd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const params = new URLSearchParams(window.location.search);
        const videoFileId = params.get('id') || params.get('fileId'); 
        const videoTitleParam = decodeURIComponent(params.get('title') || 'Playing Video');
        
        let videoDocId = null; 
        let currentUploaderId = null; 

        if (videoFileId) {
            // Set video source
            document.getElementById('videoPlayer').src = `https://intube-backend.onrender.com/stream/${videoFileId}`;
            document.getElementById('videoTitle').innerText = videoTitleParam;
            document.title = videoTitleParam;

            // 100% BULLETPROOF FIREBASE LOGIC (No Crash Guarantee)
            db.collection("videos").onSnapshot(snap => {
                let videoFound = false;
                
                snap.forEach(doc => {
                    const video = doc.data();
                    
                    // Match by fileId (ignoring text/number difference) or Document ID
                    if (String(video.fileId) === String(videoFileId) || doc.id === String(videoFileId)) {
                        videoFound = true;
                        videoDocId = doc.id; 
                        currentUploaderId = video.uploaderId;

                        // UI Update
                        document.getElementById('videoTitle').innerText = video.title || videoTitleParam;
                        document.getElementById('likeCount').innerText = video.likes || 0;
                        document.getElementById('viewCount').innerText = video.views || 0;
                        document.getElementById('channelName').innerText = video.channelName || "the new tips";

                        if(video.channelAvatar){
                            document.getElementById('channelAvatar').innerHTML = `<img src="${video.channelAvatar}">`;
                        }

                        // Update Subscribers
                        if(currentUploaderId){
                            db.collection("users").doc(currentUploaderId).onSnapshot(uDoc => {
                                if(uDoc.exists) document.getElementById('channelSubs').innerText = uDoc.data().subscribers || 0;
                            });
                            checkSubStatus();
                        }
                        
                        // Load Comments and Like state
                        loadCommentsRealtime();
                        checkLikeDislikeStatus();
                    }
                });

                if (!videoFound) {
                    document.getElementById('videoTitle').innerText = videoTitleParam + " (Info missing)";
                    document.getElementById('commentList').innerHTML = "<p style='text-align: center; color: #606060;'>Video details not found in database.</p>";
                }
            });

            // Load Suggested Videos Always
            loadSuggestedVideos();
        } else {
            document.getElementById('videoTitle').innerText = "Video Not Found";
        }

        // --- SUGGESTED VIDEOS ---
        function loadSuggestedVideos() {
            db.collection("videos").orderBy("uploadedAt", "desc").limit(15).onSnapshot(snap => {
                const list = document.getElementById('suggestedList');
                list.innerHTML = "";
                
                snap.forEach(doc => {
                    const v = doc.data();
                    if (String(v.fileId) !== String(videoFileId)) { 
                        let time = v.uploadedAt ? new Date(v.uploadedAt.toMillis()).toLocaleDateString() : 'New';
                        let channel = v.channelName || 'the new tips';
                        
                        list.innerHTML += `
                            <div class="suggested-card" onclick="window.location.href='player.html?id=${v.fileId}&title=${encodeURIComponent(v.title)}'">
                                <div class="suggested-thumb">
                                    <img src="https://img.youtube.com/vi/${v.fileId}/mqdefault.jpg" onerror="this.src='https://via.placeholder.com/140x79?text=Video';">
                                </div>
                                <div class="suggested-info">
                                    <h4 class="suggested-title">${v.title}</h4>
                                    <p class="suggested-meta">${channel}</p>
                                    <p class="suggested-meta">${v.views || 0} views • ${time}</p>
                                </div>
                            </div>
                        `;
                    }
                });
                
                if(list.innerHTML === "") {
                    list.innerHTML = "<p style='text-align: center; color: #606060; padding: 20px;'>No more videos to suggest.</p>";
                }
            });
        }

        // --- OTHER FEATURES ---
        function checkLogin() {
            if (!auth.currentUser) {
                alert("Please login to use this feature!");
                return false;
            }
            return true;
        }

        function checkLikeDislikeStatus() {
            if (auth.currentUser && videoDocId) {
                const uid = auth.currentUser.uid;
                db.collection("videos").doc(videoDocId).collection("likes").doc(uid).onSnapshot(doc => {
                    if (doc.exists) document.getElementById('likeBtn').classList.add('active');
                    else document.getElementById('likeBtn').classList.remove('active');
                });
                db.collection("videos").doc(videoDocId).collection("dislikes").doc(uid).onSnapshot(doc => {
                    if (doc.exists) document.getElementById('dislikeBtn').classList.add('active');
                    else document.getElementById('dislikeBtn').classList.remove('active');
                });
            }
        }

        function toggleLike() {
            if (!checkLogin() || !videoDocId) return;
            const uid = auth.currentUser.uid;
            const likeRef = db.collection("videos").doc(videoDocId).collection("likes").doc(uid);
            const dislikeRef = db.collection("videos").doc(videoDocId).collection("dislikes").doc(uid);

            likeRef.get().then(doc => {
                if (doc.exists) {
                    likeRef.delete();
                    db.collection("videos").doc(videoDocId).update({ likes: firebase.firestore.FieldValue.increment(-1) });
                } else {
                    likeRef.set({ timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                    db.collection("videos").doc(videoDocId).update({ likes: firebase.firestore.FieldValue.increment(1) });
                    dislikeRef.get().then(dDoc => { if (dDoc.exists) dislikeRef.delete(); });
                }
            });
        }

        function toggleDislike() {
            if (!checkLogin() || !videoDocId) return;
            const uid = auth.currentUser.uid;
            const likeRef = db.collection("videos").doc(videoDocId).collection("likes").doc(uid);
            const dislikeRef = db.collection("videos").doc(videoDocId).collection("dislikes").doc(uid);

            dislikeRef.get().then(doc => {
                if (doc.exists) {
                    dislikeRef.delete();
                } else {
                    dislikeRef.set({ timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                    likeRef.get().then(lDoc => {
                        if (lDoc.exists) {
                            likeRef.delete();
                            db.collection("videos").doc(videoDocId).update({ likes: firebase.firestore.FieldValue.increment(-1) });
                        }
                    });
                }
            });
        }

        function shareVideo() {
            if (navigator.share) {
                navigator.share({ title: videoTitleParam, url: window.location.href });
            } else {
                alert("Link copied! " + window.location.href);
            }
        }

        function saveVideo() {
            if (!checkLogin() || !videoDocId) return;
            db.collection("users").doc(auth.currentUser.uid).collection("watchLater").add({
                fileId: videoFileId, title: videoTitleParam, savedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('saveBtn').classList.add('active');
                document.getElementById('saveText').innerText = "Saved";
            });
        }

        function downloadVideo() {
            if (!videoFileId) return;
            const a = document.createElement('a');
            a.href = `https://intube-backend.onrender.com/stream/${videoFileId}`;
            a.target = "_blank"; a.download = "Intube_Video.mp4";
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function toggleSubscribe() {
            if (!checkLogin() || !currentUploaderId) return;
            if (currentUploaderId === auth.currentUser.uid) { alert("You can't subscribe to yourself!"); return; }

            const subRef = db.collection("users").doc(auth.currentUser.uid).collection("subscriptions").doc(currentUploaderId);
            const btn = document.getElementById('subBtn');

            subRef.get().then(doc => {
                if (doc.exists) {
                    subRef.delete().then(() => {
                        db.collection("users").doc(currentUploaderId).update({ subscribers: firebase.firestore.FieldValue.increment(-1) });
                        btn.innerText = "Subscribe"; btn.classList.remove('subscribed');
                    });
                } else {
                    subRef.set({ subscribedAt: firebase.firestore.FieldValue.serverTimestamp() }).then(() => {
                        db.collection("users").doc(currentUploaderId).update({ subscribers: firebase.firestore.FieldValue.increment(1) });
                        btn.innerText = "Subscribed"; btn.classList.add('subscribed');
                    });
                }
            });
        }

        function checkSubStatus() {
            if(auth.currentUser && currentUploaderId) {
                db.collection("users").doc(auth.currentUser.uid).collection("subscriptions").doc(currentUploaderId).get().then(doc => {
                    if(doc.exists) {
                        const btn = document.getElementById('subBtn');
                        btn.innerText = "Subscribed"; btn.classList.add('subscribed');
                    }
                });
            }
        }

        function loadCommentsRealtime() {
            if(!videoDocId) return;
            db.collection("videos").doc(videoDocId).collection("comments").orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('commentList');
                document.getElementById('commentCount').innerText = snap.size;
                list.innerHTML = "";

                if(snap.empty) {
                    list.innerHTML = "<p style='text-align:center; color:#606060;'>No comments yet.</p>";
                    return;
                }

                snap.forEach(doc => {
                    const c = doc.data();
                    let avatar = c.userAvatar ? `<img src="${c.userAvatar}" style="width:100%;height:100%;object-fit:cover;">` : `<span>${(c.userName || 'U').charAt(0).toUpperCase()}</span>`;
                    list.innerHTML += `
                        <div class="comment-item">
                            <div class="comment-avatar">${avatar}</div>
                            <div>
                                <p class="comment-user" style="margin:0;">${c.userName || 'User'}</p>
                                <p class="comment-text">${c.commentText}</p>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function postComment() {
            if (!checkLogin() || !videoDocId) return;
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if(!text) return;

            document.getElementById('postBtn').innerText = "...";
            db.collection("videos").doc(videoDocId).collection("comments").add({
                commentText: text,
                userName: auth.currentUser.displayName || "User",
                userAvatar: auth.currentUser.photoURL || "",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                input.value = "";
                document.getElementById('postBtn').innerText = "Post";
            });
        }
    </script>
</body>
</html>
