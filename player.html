<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Player - Intube</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Roboto; margin: 0; background: #fff; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        .info { padding: 15px; }
        .actions { display: flex; gap: 20px; padding: 15px 0; border-bottom: 1px solid #eee; }
        .action-btn { cursor: pointer; font-weight: 500; }
        .comments { padding: 15px; }
        input { width: 70%; padding: 10px; }
        button { padding: 10px 20px; background: #065fd4; color: white; border: none; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="videoPlayer" width="100%" height="100%" controls autoplay></video>
</div>

<div class="info">
    <h2 id="videoTitle">Loading...</h2>
    <div class="actions">
        <span class="action-btn" onclick="likeVideo()">👍 <span id="likeCount">0</span></span>
        <span class="action-btn" onclick="subscribe()">🔔 Subscribe</span>
    </div>
</div>

<div class="comments">
    <input type="text" id="commentInput" placeholder="Add a comment...">
    <button onclick="postComment()">Post</button>
    <div id="commentList" style="margin-top:20px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAnXb8ka21ajr_HSGHtfhFoIwqOGBdhi_0", authDomain: "intube-ba578.firebaseapp.com", projectId: "intube-ba578", storageBucket: "intube-ba578.firebasestorage.app", messagingSenderId: "862455398504", appId: "1:862455398504:web:bc76d18bf7670bb5aa3bdd", measurementId: "G-944K8C4VM8" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const params = new URLSearchParams(window.location.search);
    const videoId = params.get('id');
    document.getElementById('videoPlayer').src = `https://intube-backend.onrender.com/stream/${videoId}`;
    document.getElementById('videoTitle').innerText = decodeURIComponent(params.get('title'));

    function likeVideo() { db.collection("videos").doc(videoId).update({ likes: firebase.firestore.FieldValue.increment(1) }); }
    
    async function subscribe() {
        const videoDoc = await db.collection("videos").doc(videoId).get();
        const creatorId = videoDoc.data().uploaderId;
        db.collection("users").doc(auth.currentUser.uid).collection("subscriptions").doc(creatorId).set({ subscribedAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("Subscribed!");
    }

    function postComment() {
        db.collection("videos").doc(videoId).collection("comments").add({ user: auth.currentUser.displayName, text: document.getElementById('commentInput').value, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    }

    db.collection("videos").doc(videoId).onSnapshot(doc => { document.getElementById('likeCount').innerText = doc.data().likes || 0; });
    db.collection("videos").doc(videoId).collection("comments").orderBy("createdAt", "desc").onSnapshot(snap => {
        let h = ""; snap.forEach(d => h += `<div><b>${d.data().user}:</b> ${d.data().text}</div>`);
        document.getElementById('commentList').innerHTML = h;
    });
</script>
</body>
</html>
