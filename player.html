<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - Intube</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: Roboto, sans-serif; margin: 0; background: #fff; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        .info { padding: 15px; }
        .title { font-size: 18px; font-weight: bold; margin: 0; }
        .actions { display: flex; gap: 20px; padding: 15px 0; border-bottom: 1px solid #eee; }
        .action-btn { cursor: pointer; font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .comments { padding: 15px; }
        .comment-input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #065fd4; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .comment-item { margin-bottom: 15px; font-size: 14px; }
        .comment-user { font-weight: bold; margin-right: 5px; color: #555; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="videoPlayer" width="100%" height="100%" controls autoplay></video>
</div>

<div class="info">
    <h2 class="title" id="videoTitle">Loading...</h2>
    <div class="actions">
        <span class="action-btn" onclick="likeVideo()">👍 <span id="likeCount">0</span></span>
        <span class="action-btn" onclick="subscribe()">🔔 Subscribe</span>
    </div>
</div>

<div class="comments">
    <h3>Comments</h3>
    <div class="comment-input-box">
        <input type="text" id="commentInput" placeholder="Kuch likhiye...">
        <button onclick="postComment()">Post</button>
    </div>
    <div id="commentList"></div>
</div>

<script>
    // Firebase Config (Yahi connection hai)
    const firebaseConfig = {
        apiKey: "AIzaSyAnXb8ka21ajr_HSGHtfhFoIwqOGBdhi_0",
        authDomain: "intube-ba578.firebaseapp.com",
        projectId: "intube-ba578",
        storageBucket: "intube-ba578.firebasestorage.app",
        messagingSenderId: "862455398504",
        appId: "1:862455398504:web:bc76d18bf7670bb5aa3bdd",
        measurementId: "G-944K8C4VM8"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const params = new URLSearchParams(window.location.search);
    const videoId = params.get('id'); 

    // Video Playback
    if(videoId) {
        document.getElementById('videoPlayer').src = `https://intube-backend.onrender.com/stream/${videoId}`;
        document.getElementById('videoTitle').innerText = decodeURIComponent(params.get('title'));
    }

    // Like Function
    function likeVideo() {
        if(!videoId) return;
        db.collection("videos").doc(videoId).update({ 
            likes: firebase.firestore.FieldValue.increment(1) 
        });
    }

    // Subscribe Function
    async function subscribe() {
        if(!auth.currentUser) return alert("Subscribe karne ke liye login karein!");
        const doc = await db.collection("videos").doc(videoId).get();
        const creatorId = doc.data().uploaderId;
        
        db.collection("users").doc(auth.currentUser.uid).collection("subscriptions").doc(creatorId).set({
            subscribedAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => alert("Subscribed!"));
    }

    // Comment Post Function
    function postComment() {
        if(!auth.currentUser) return alert("Comment karne ke liye login karein!");
        const text = document.getElementById('commentInput').value;
        if(!text) return;
        
        db.collection("videos").doc(videoId).collection("comments").add({
            user: auth.currentUser.displayName || "User",
            text: text,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('commentInput').value = "";
    }

    // Real-time Data (Like aur Comments)
    if(videoId) {
        db.collection("videos").doc(videoId).onSnapshot(doc => {
            if(doc.exists) document.getElementById('likeCount').innerText = doc.data().likes || 0;
        });

        db.collection("videos").doc(videoId).collection("comments").orderBy("createdAt", "desc")
        .onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                html += `<div class="comment-item"><span class="comment-user">${doc.data().user}:</span> ${doc.data().text}</div>`;
            });
            document.getElementById('commentList').innerHTML = html;
        });
    }
</script>
</body>
</html>
