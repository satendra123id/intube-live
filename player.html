<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Player - Intube</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Roboto; margin: 0; background: #fff; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        .info { padding: 15px; }
        .title { font-size: 18px; font-weight: bold; margin: 0; }
        .actions { display: flex; gap: 20px; padding: 10px 0; border-bottom: 1px solid #eee; }
        .action-btn { cursor: pointer; font-size: 14px; font-weight: 500; }
        .comments { padding: 15px; }
        input { width: 80%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .comment-item { margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="videoPlayer" width="100%" height="100%" controls autoplay></video>
</div>

<div class="info">
    <h2 class="title" id="videoTitle">Loading...</h2>
    <div class="actions">
        <span class="action-btn" onclick="likeVideo()">👍 <span id="likeCount">0</span></span>
        <span class="action-btn" onclick="subscribe()">🔔 Subscribe</span>
    </div>
</div>

<div class="comments">
    <h3>Comments</h3>
    <input type="text" id="commentInput" placeholder="Add a comment...">
    <button onclick="postComment()">Post</button>
    <div id="commentList" style="margin-top: 15px;"></div>
</div>

<script>
    const firebaseConfig = { /* Apna Config Yahan Dalen */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const params = new URLSearchParams(window.location.search);
    const videoId = params.get('id'); // Ye document ID hai

    // Load Video
    document.getElementById('videoPlayer').src = `https://intube-backend.onrender.com/stream/${videoId}`;
    document.getElementById('videoTitle').innerText = decodeURIComponent(params.get('title'));

    // Like Function
    function likeVideo() {
        const docRef = db.collection("videos").doc(videoId);
        docRef.update({ likes: firebase.firestore.FieldValue.increment(1) });
    }

    // Comment Post
    function postComment() {
        if(!auth.currentUser) return alert("Login karo pehle!");
        const text = document.getElementById('commentInput').value;
        db.collection("videos").doc(videoId).collection("comments").add({
            user: auth.currentUser.displayName,
            text: text,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('commentInput').value = "";
    }

    // Load Comments Real-time
    db.collection("videos").doc(videoId).collection("comments").orderBy("createdAt", "desc")
    .onSnapshot(snap => {
        let html = "";
        snap.forEach(doc => {
            html += `<div class="comment-item"><b>${doc.data().user}:</b> ${doc.data().text}</div>`;
        });
        document.getElementById('commentList').innerHTML = html;
    });

    // Real-time Like Count
    db.collection("videos").doc(videoId).onSnapshot(doc => {
        document.getElementById('likeCount').innerText = doc.data().likes || 0;
    });
</script>
</body>
</html>
