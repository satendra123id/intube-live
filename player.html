<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intube - Professional Player</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Roboto, Arial, sans-serif; margin: 0; background: #fff; }
        .video-player { width: 100%; aspect-ratio: 16/9; background: #000; }
        .details { padding: 15px; }
        .title { font-size: 18px; font-weight: 600; color: #0f0f0f; margin: 0 0 5px 0; }
        .stats { color: #606060; font-size: 14px; margin-bottom: 15px; }
        .actions { display: flex; gap: 10px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        .btn { cursor: pointer; padding: 10px 20px; background: #f2f2f2; border-radius: 20px; border: none; font-weight: 600; }
        .comment-section { margin-top: 20px; }
        #commentInput { width: 80%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <video id="videoPlayer" class="video-player" controls autoplay playsinline></video>
    
    <div class="details">
        <h1 id="titleDisplay" class="title">Loading...</h1>
        <p id="viewCount" class="stats">Loading...</p>
        
        <div class="actions">
            <button class="btn" onclick="toggleLike()">👍 Like</button>
            <button class="btn" onclick="toggleSubscribe()">Subscribe</button>
        </div>

        <div class="comment-section">
            <input type="text" id="commentInput" placeholder="Add a comment...">
            <button onclick="postComment()" class="btn">Post</button>
            <div id="commentsList"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* Apna Config wahi rahega */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');
        
        // 1. UNIQUE VIEW LOGIC
        if (!localStorage.getItem('viewed_' + fileId)) {
            db.collection("videos").where("fileId", "==", fileId).get().then(snap => {
                snap.forEach(doc => {
                    doc.ref.update({ views: firebase.firestore.FieldValue.increment(1) });
                });
            });
            localStorage.setItem('viewed_' + fileId, 'true');
        }

        // 2. TOGGLE LIKE LOGIC
        function toggleLike() {
            let liked = localStorage.getItem('liked_' + fileId);
            db.collection("videos").where("fileId", "==", fileId).get().then(snap => {
                snap.forEach(doc => {
                    let increment = liked ? -1 : 1;
                    doc.ref.update({ likes: firebase.firestore.FieldValue.increment(increment) });
                    liked ? localStorage.removeItem('liked_' + fileId) : localStorage.setItem('liked_' + fileId, 'true');
                });
            });
        }

        // 3. SUBSCRIBE LOGIC
        function toggleSubscribe() {
            db.collection("channel_info").doc("myChannel").update({
                subscribers: firebase.firestore.FieldValue.increment(1)
            }).then(() => alert("Subscribed!"));
        }

        // 4. COMMENTS LOGIC
        function postComment() {
            let text = document.getElementById('commentInput').value;
            db.collection("videos").where("fileId", "==", fileId).get().then(snap => {
                snap.forEach(doc => {
                    doc.ref.collection("comments").add({ text: text, timestamp: new Date() });
                });
            });
        }
    </script>
</body>
</html>
