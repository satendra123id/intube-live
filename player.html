    <script>
        const firebaseConfig = { /* Apna Config wahi rehne dein */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');

        // 1. LIKE TOGGLE LOGIC (Fix: Ek baar click par hi hoga)
        function toggleLike() {
            let liked = localStorage.getItem('liked_' + fileId);
            
            db.collection("videos").where("fileId", "==", fileId).get().then(snap => {
                snap.forEach(doc => {
                    let increment = liked ? -1 : 1;
                    doc.ref.update({ likes: firebase.firestore.FieldValue.increment(increment) });
                    
                    if (liked) {
                        localStorage.removeItem('liked_' + fileId);
                        alert("Like removed!");
                    } else {
                        localStorage.setItem('liked_' + fileId, 'true');
                        alert("Liked!");
                    }
                });
            });
        }

        // 2. SUBSCRIBE LOGIC (Fix: Button click par trigger hoga)
        function toggleSubscribe() {
            db.collection("channel_info").doc("myChannel").update({
                subscribers: firebase.firestore.FieldValue.increment(1)
            }).then(() => {
                alert("Channel Subscribed!");
            }).catch((error) => {
                alert("Error: " + error.message);
            });
        }

        // 3. REAL-TIME UPDATES (Views, Likes, Subs)
        db.collection("videos").where("fileId", "==", fileId).onSnapshot(snap => {
            snap.forEach(doc => {
                document.getElementById('viewCount').innerText = doc.data().views + " views";
                document.getElementById('likeCount').innerText = doc.data().likes || 0;
            });
        });

        db.collection("channel_info").doc("myChannel").onSnapshot(doc => {
            if(doc.exists) document.getElementById('subCount').innerText = doc.data().subscribers;
        });
    </script>
