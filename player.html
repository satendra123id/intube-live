<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intube Player</title>
    <style>
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #fff; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        .content { padding: 12px; }
        .title { font-size: 18px; font-weight: 600; margin: 0 0 8px 0; color: #0f0f0f; }
        .stats { font-size: 14px; color: #606060; margin-bottom: 15px; }
        .actions { display: flex; gap: 15px; border-bottom: 1px solid #e5e5e5; padding-bottom: 15px; }
        .btn { border: none; background: #f2f2f2; padding: 8px 16px; border-radius: 20px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <video id="videoPlayer" class="video-container" controls autoplay playsinline></video>
    
    <div class="content">
        <h1 class="title" id="titleDisplay">Loading...</h1>
        <div class="stats" id="viewCount">0 views</div>
        
        <div class="actions">
            <button class="btn" onclick="updateLike()">👍 Like</button>
            <button class="btn">Share</button>
            <button class="btn" style="background:#0f0f0f; color:#fff;">Subscribe</button>
        </div>
    </div>

    <script>
        // Yahan wahi purana Firebase code aur logic rahega jo humne pehle fix kiya tha
        // Main logic wahi hai, bas design change ho gaya hai.
    </script>
</body>
</html>
