<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Player</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        /* CSS Wahi purani rahegi, bas logic update hoga */
        body { font-family: sans-serif; }
        .video-player { width: 100%; }
        .stats-btn { cursor: pointer; padding: 10px; background: #eee; margin: 5px; border-radius: 20px; border: none; }
    </style>
</head>
<body>

    <video id="videoPlayer" class="video-player" controls autoplay playsinline></video>
    <h1 id="titleDisplay">Loading...</h1>
    <p id="viewCount">Loading views...</p>
    
    <button class="stats-btn" onclick="updateLike()">👍 <span id="likeCount">0</span></button>
    <button class="stats-btn" onclick="subscribe()">Subscribe</button>

    <script>
        const firebaseConfig = { /* Wahi puraana config yahan rahega */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');
        const videoTitle = urlParams.get('title');

        document.getElementById('titleDisplay').innerText = videoTitle;
        document.getElementById('videoPlayer').src = 'https://intube-backend.onrender.com/stream/' + fileId;

        // 1. VIEW COUNTER (Page khulte hi view +1)
        const videoRef = db.collection("videos").where("fileId", "==", fileId);
        videoRef.get().then((snapshot) => {
            snapshot.forEach((doc) => {
                db.collection("videos").doc(doc.id).update({
                    views: firebase.firestore.FieldValue.increment(1)
                });
                // Real-time update dikhane ke liye
                db.collection("videos").doc(doc.id).onSnapshot((doc) => {
                    document.getElementById('viewCount').innerText = doc.data().views + " views";
                    document.getElementById('likeCount').innerText = doc.data().likes || 0;
                });
            });
        });

        // 2. LIKE LOGIC
        function updateLike() {
            videoRef.get().then((snapshot) => {
                snapshot.forEach((doc) => {
                    db.collection("videos").doc(doc.id).update({
                        likes: firebase.firestore.FieldValue.increment(1)
                    });
                });
            });
        }
    </script>
</body>
</html>
