<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Studio - Upload</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Roboto; background: #f9f9f9; padding: 20px; }
        .box { background: #fff; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 10px; background: #065fd4; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Upload Video</h2>
        <input type="file" id="videoFile" accept="video/*">
        <input type="text" id="vTitle" placeholder="Video Title">
        <textarea id="vDesc" placeholder="Description"></textarea>
        <button onclick="upload()">Publish</button>
        <p id="status"></p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAnXb8ka21ajr_HSGHtfhFoIwqOGBdhi_0", authDomain: "intube-ba578.firebaseapp.com", projectId: "intube-ba578", storageBucket: "intube-ba578.firebasestorage.app", messagingSenderId: "862455398504", appId: "1:862455398504:web:bc76d18bf7670bb5aa3bdd" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        async function upload() {
            const user = auth.currentUser;
            if(!user) return alert("Login karo!");
            
            const file = document.getElementById('videoFile').files[0];
            const formData = new FormData();
            formData.append('video', file);

            document.getElementById('status').innerText = "Uploading...";
            
            const res = await fetch('https://intube-backend.onrender.com/upload-video', { method: 'POST', body: formData });
            const data = await res.json();

            if(data.success) {
                await db.collection("videos").add({
                    title: document.getElementById('vTitle').value,
                    fileId: data.fileId,
                    uploaderId: user.uid,
                    channelName: user.displayName || "User",
                    uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Upload Done!");
                window.location.href = "profile.html";
            }
        }
    </script>
</body>
</html>
