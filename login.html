<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - the new tips</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { margin: 0; font-family: 'Roboto', sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-box { background: white; padding: 40px 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 90%; }
        .logo svg { width: 50px; height: 50px; fill: red; margin-bottom: 15px; }
        .login-box h2 { margin: 0 0 10px 0; font-size: 22px; color: #0f0f0f; }
        .login-box p { color: #606060; font-size: 14px; margin-bottom: 30px; }
        
        /* Google Button Style */
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: #fff; border: 1px solid #ddd; padding: 12px; border-radius: 25px; cursor: pointer; font-size: 15px; font-weight: 500; transition: background 0.3s; }
        .google-btn:hover { background: #f2f2f2; }
        .google-btn img { width: 20px; height: 20px; }
        
        .status { margin-top: 15px; font-size: 13px; color: #065fd4; font-weight: 500; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">
            <svg viewBox="0 0 24 24"><path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.861-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M10,15.464V8.536L16,12L10,15.464z"/></svg>
        </div>
        <h2>Sign in to the new tips</h2>
        <p>Login with Google to upload videos and manage your account.</p>
        
        <button class="google-btn" onclick="signInWithGoogle()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
            Continue with Google
        </button>
        
        <div class="status" id="loginStatus"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnXb8ka21ajr_HSGHtfhFoIwqOGBdhi_0",
            authDomain: "intube-ba578.firebaseapp.com",
            projectId: "intube-ba578",
            storageBucket: "intube-ba578.firebasestorage.app",
            messagingSenderId: "862455398504",
            appId: "1:862455398504:web:bc76d18bf7670bb5aa3bdd",
            measurementId: "G-944K8C4VM8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Agar pehle se login hai toh seedha Home (index.html) par bhej do
                window.location.href = "index.html";
            }
        });

        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            const statusDiv = document.getElementById('loginStatus');
            
            statusDiv.innerText = "Connecting to Google...";

            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    statusDiv.innerText = "Setting up your Account...";
                    
                    // Database mein Channel/User details save kar rahe hain
                    db.collection("users").doc(user.uid).set({
                        channelName: user.displayName,
                        email: user.email,
                        profilePic: user.photoURL,
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true }).then(() => {
                        statusDiv.style.color = "green";
                        statusDiv.innerText = "Login Successful! Redirecting...";
                        
                        setTimeout(() => {
                            window.location.href = "index.html"; // Login hone ke baad Home page par redirect
                        }, 1000);
                    });
                })
                .catch((error) => {
                    console.error(error);
                    statusDiv.style.color = "red";
                    statusDiv.innerText = "Login Failed: " + error.message;
                });
        }
    </script>
</body>
</html>
